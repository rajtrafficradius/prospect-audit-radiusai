<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Presentation Slide Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080C14;
            --navy: #0F172A;
            --accent: #00CCFF;
            --accent-glow: rgba(0, 204, 255, 0.4);
            --gold: #FACC15;
            --white: #F8FAFC;
            --glass: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --grid: rgba(0, 204, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            /* Coordinate Grid Background */
            background-image: 
                radial-gradient(circle at 2px 2px, var(--grid) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* V14 Layout Structure */
        .v14-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: 160px 1fr 100px;
            padding: 0;
        }

        /* Global Header (Span Full) */
        .v14-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 80px;
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .v14-title-group { display: flex; flex-direction: column; }
        .v14-subtitle { font-family: 'Outfit'; font-size: 24px; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; font-weight: 600; }
        .v14-title { font-family: 'Outfit'; font-size: 72px; font-weight: 800; letter-spacing: -2px; text-transform: uppercase; line-height: 1.1; }

        /* Full Width Visual Area */
        .v14-visual-area {
            position: relative;
            padding: 40px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Strategic Takeaway Bar - Centered at Bottom */
        .v14-takeaway {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 1200px;
            padding: 25px 40px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--accent);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            z-index: 150;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .v14-takeaway-label { 
            font-size: 14px; 
            color: var(--accent); 
            font-weight: 800; 
            text-transform: uppercase; 
            white-space: nowrap;
            padding-right: 30px;
            border-right: 1px solid var(--glass-border);
        }
        .v14-takeaway-text { font-size: 24px; font-weight: 600; color: #FFF; line-height: 1.4; font-style: italic; text-align: left; flex: 1; }

        /* Global Footer */
        .v14-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            border-top: 1px solid var(--glass-border);
        }

        /* Decorative Corner Markers */
        .corner-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent);
            opacity: 0.3;
            z-index: 100;
        }
        .cm-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .cm-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .cm-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .cm-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .section-badge {
            position: absolute;
            top: 180px;
            left: 80px;
            background: var(--accent);
            color: var(--bg);
            padding: 5px 15px;
            font-family: 'Outfit';
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            z-index: 80;
        }

        /* Ambient Effects */
        .v14-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
        }

        /* Custom Visual Placeholder */
        #v14-visual-target { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

    </style>
</head>
<body>
    <div class="v14-glow" style="top: -200px; left: -200px;"></div>
    
    <div class="corner-marker cm-tl"></div>
    <div class="corner-marker cm-tr"></div>
    <div class="corner-marker cm-bl"></div>
    <div class="corner-marker cm-br"></div>

    <div class="section-badge" id="v14-section-badge">STRAT-CORE</div>

    <div class="v14-container">
        <!-- HEADER -->
        <header class="v14-header">
            <div class="v14-title-group">
                <p id="v14-subtitle" class="v14-subtitle">STRATEGIC GROWTH ANALYSIS</p>
                <h1 id="v14-title" class="v14-title">Executive Summary</h1>
            </div>
            <div style="text-align: right;">
                <p style="color: var(--accent); font-weight: 800; font-size: 24px; letter-spacing: 2px;">TRAFFIC RADIUS</p>
                <p style="font-size: 14px; color: rgba(255,255,255,0.4); letter-spacing: 1px;">STRATEGY ENGINE v14.0</p>
            </div>
        </header>

        <!-- VISUAL CONTENT (FULL WIDTH) -->
        <main class="v14-visual-area">
            <div id="v14-visual-target">
                <!-- SVG Frameworks injected here -->
            </div>

            <div id="v14-takeaway-container" class="v14-takeaway">
                <p class="v14-takeaway-label">Master Takeaway</p>
                <p id="v14-takeaway" class="v14-takeaway-text">Establishing a dominant organic foundation is the prerequisite for scaling AI-driven visibility.</p>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="v14-footer">
            <div style="display: flex; gap: 40px;">
                <p>CONFIDENTIAL BUSINESS STRATEGY</p>
                <p style="color: var(--gold); border-left: 1px solid var(--glass-border); padding-left: 40px;">© 2026 RADIUS AI</p>
            </div>
            <p id="v14-slide-num">SLIDE 01 OF 15</p>
        </footer>
    </div>

    <script>
        window.loadComponent = function(htmlContent, slideData) {
            if (!slideData) return;

            // 1. Text Mapping
            if (slideData.title) document.getElementById('v14-title').innerHTML = slideData.title;
            if (slideData.subtitle) document.getElementById('v14-subtitle').innerHTML = slideData.subtitle;
            
            // 2. Takeaway Mapping
            if (slideData.takeaway) {
                document.getElementById('v14-takeaway').innerHTML = slideData.takeaway;
            }

            // 3. Visual Content Injection
            document.getElementById('v14-visual-target').innerHTML = htmlContent;

            // 4. Visual Data Mapping (Recursive)
            const vd = slideData.visual_data;
            if (vd) {
                if (Array.isArray(vd)) {
                    vd.forEach((val, i) => {
                        const el = document.getElementById(`val${i+1}`);
                        if (el) el.innerHTML = val;
                        const bar = document.getElementById(`bar${i+1}`);
                        if (bar) bar.style.width = (typeof val === 'number' ? val : parseInt(val)) + '%';
                    });
                }
            }
        };
    </script>
</body>
</html>
