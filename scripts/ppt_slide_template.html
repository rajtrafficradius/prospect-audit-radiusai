<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Presentation Slide Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080C14;
            --navy: #0F172A;
            --accent: #00CCFF;
            --accent-glow: rgba(0, 204, 255, 0.4);
            --gold: #FACC15;
            --white: #F8FAFC;
            --glass: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --grid: rgba(0, 204, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            /* Coordinate Grid Background */
            background-image: 
                radial-gradient(circle at 2px 2px, var(--grid) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* V15 Managed Flex Stack */
        .v15-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* Global Header */
        .v15-header {
            height: 160px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            flex-shrink: 0;
        }

        .v15-title-group { display: flex; flex-direction: column; }
        .v15-subtitle { font-family: 'Outfit'; font-size: 24px; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; font-weight: 600; }
        .v15-title { font-family: 'Outfit'; font-size: 72px; font-weight: 800; letter-spacing: -2px; text-transform: uppercase; line-height: 1.1; }

        /* Main Content Area (Visual + Insights) */
        .v15-content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 80px 100px 80px; /* Large bottom padding for takeaway */
            gap: 15px;
            overflow: hidden;
            position: relative;
        }

        /* Perfectly Centered Visual Target */
        #v15-visual-target { 
            flex: 1.2; /* Give visual more weight */
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 10;
            min-height: 300px;
        }

        /* The 8-Bullet Insight Matrix */
        .v15-insight-matrix {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, auto);
            gap: 10px;
            z-index: 20;
            flex-shrink: 0;
        }

        .v15-insight-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(0, 204, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            backdrop-filter: blur(15px);
            min-height: 70px; /* Reduced to save space */
        }

        .v15-card-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin-top: 7px; flex-shrink: 0; box-shadow: 0 0 8px var(--accent); }
        .v15-card-text { font-size: 14px; color: rgba(255, 255, 255, 0.85); line-height: 1.2; font-weight: 400; }

        /* Takeaway Bar (Absolute within content area, but clear of grid) */
        .v15-takeaway {
            position: absolute;
            bottom: 20px;
            left: 80px;
            right: 80px;
            padding: 15px 30px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--accent);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            z-index: 150;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .v15-takeaway-label { font-size: 11px; color: var(--accent); font-weight: 800; text-transform: uppercase; white-space: nowrap; padding-right: 15px; border-right: 1px solid var(--glass-border); }
        .v15-takeaway-text { font-size: 18px; font-weight: 600; color: #FFF; line-height: 1.2; font-style: italic; }

        /* Footer */
        .v15-footer {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="v14-glow" style="top: -200px; left: -200px;"></div>
    
    <div class="corner-marker cm-tl"></div>
    <div class="corner-marker cm-tr"></div>
    <div class="corner-marker cm-bl"></div>
    <div class="corner-marker cm-br"></div>

    <div class="section-badge" id="v14-section-badge">STRAT-CORE</div>

    <div class="v15-container">
        <header class="v15-header">
            <div class="v15-title-group">
                <p id="v14-subtitle" class="v15-subtitle">STRATEGIC GROWTH ANALYSIS</p>
                <h1 id="v14-title" class="v15-title">Executive Summary</h1>
            </div>
            <div style="text-align: right;">
                <p style="color: var(--accent); font-weight: 800; font-size: 24px; letter-spacing: 2px;">TRAFFIC RADIUS</p>
                <p style="font-size: 14px; color: rgba(255,255,255,0.4); letter-spacing: 1px;">STRATEGY ENGINE v15.0</p>
            </div>
        </header>

        <main class="v15-content-area">
            <div id="v15-visual-target">
                <!-- SVG Frameworks -->
            </div>

            <div id="v15-bullets" class="v15-insight-matrix">
                <!-- 8 Bullets -->
            </div>

            <div class="v15-takeaway">
                <p class="v15-takeaway-label">Master Takeaway</p>
                <p id="v14-takeaway" class="v15-takeaway-text"></p>
            </div>
        </main>

        <footer class="v15-footer">
            <div style="display: flex; gap: 40px;">
                <p>CONFIDENTIAL BUSINESS STRATEGY</p>
                <p style="color: var(--gold); border-left: 1px solid var(--glass-border); padding-left: 40px;">© 2026 RADIUS AI</p>
            </div>
            <p id="v14-slide-num">SLIDE 01 OF 15</p>
        </footer>
    </div>

    <script>
        window.loadComponent = function(htmlContent, slideData) {
            if (!slideData) return;

            // 1. Text Mapping
            if (slideData.title) document.getElementById('v14-title').innerHTML = slideData.title;
            if (slideData.subtitle) document.getElementById('v14-subtitle').innerHTML = slideData.subtitle;
            
            // 2. Takeaway Mapping
            if (slideData.takeaway) {
                document.getElementById('v14-takeaway').innerHTML = slideData.takeaway;
            }

            // 3. Bullets Mapping (The v15 Insight Matrix - 8 bullets)
            const bulletContainer = document.getElementById('v15-bullets');
            if (bulletContainer && slideData.bullets) {
                bulletContainer.innerHTML = slideData.bullets
                    .map(b => `
                        <div class="v15-insight-card">
                            <div class="v15-card-dot"></div>
                            <div class="v15-card-text">${b}</div>
                        </div>
                    `).join('');
            }

            // 4. Visual Content Injection
            document.getElementById('v15-visual-target').innerHTML = htmlContent;

            // 5. Visual Data Mapping (Enhanced for v15.1)
            const vd = slideData.visual_data;
            if (vd && Array.isArray(vd)) {
                vd.forEach((item, i) => {
                    const idx = i + 1;
                    const valEl = document.getElementById(`val${idx}`);
                    const lblEl = document.getElementById(`lbl${idx}`);
                    const barEl = document.getElementById(`bar${idx}`);

                    if (typeof item === 'string' && item.includes(':')) {
                        const [label, value] = item.split(':').map(s => s.trim());
                        if (lblEl) lblEl.innerHTML = label;
                        if (valEl) valEl.innerHTML = value;
                        if (barEl) barEl.style.width = (parseInt(value) || 0) + '%';
                    } else {
                        if (valEl) valEl.innerHTML = item;
                        if (barEl) barEl.style.width = (typeof item === 'number' ? item : parseInt(item) || 0) + '%';
                    }
                });
            }
        };
    </script>
</body>
</html>
